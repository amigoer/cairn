{{- /* Footer：单行 —— 版权 + 工具链 */ -}}
<footer class="mt-12 border-t border-border">
  <div class="mx-auto max-w-4xl px-4 md:px-6 lg:px-8 py-6 flex items-center justify-between gap-x-4 gap-y-1 text-[11px] font-mono text-muted-foreground/85">
    <div class="flex flex-wrap items-center gap-x-2 gap-y-1">
      <span>© {{ now.Year }} {{ .Site.Title }}</span>
      {{ with .Site.Params.icp }}
        <span class="opacity-50">·</span>
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener" class="hover:text-foreground transition-colors">{{ . }}</a>
      {{ end }}
    </div>
    <div class="flex flex-wrap items-center gap-x-3 gap-y-1">
      <span class="inline-flex items-center gap-1.5">
        {{ i18n "footerThemedBy" }}
        <a href="https://github.com/amigoer/almanac" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-foreground/80 hover:text-foreground transition-colors">
          {{ with resources.Get "icons/almanac.svg" }}
            <span class="inline-flex size-5 shrink-0 items-center">{{ .Content | safeHTML }}</span>
          {{ end }}
          Almanac
        </a>
      </span>
    </div>
  </div>
</footer>

{{- partial "extend_footer.html" . }}
