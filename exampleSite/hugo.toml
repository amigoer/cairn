baseURL = 'https://example.com/'
languageCode = 'zh-cn'
defaultContentLanguage = "zh"
title = "Cairn Demo"
theme = 'cairn'

enableRobotsTXT = true
enableEmoji = true
hasCJKLanguage = true
summaryLength = 60
pluralizeListTitles = false

[pagination]
  pagerSize = 10

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  # 基础信息
  author = "Your Name"
  description = "Your tagline here — describe what this site is about."
  avatar = "/images/avatar.png"          # 放进 static/images/ 即可
  bannerImage = "/images/banner.webp"    # 顶部 banner（可选）
  position = "Job Title"
  location = "City"
  statusText = "Available"               # 头像上的小绿点状态
  email = "you@example.com"
  icp = ""                               # 大陆 ICP 备案号（可选）

  # Hero 文案
  heroTitle = "Hi, I'm Your Name"
  heroSubtitle = "A short paragraph introducing the site / yourself."
  tagline = "A short philosophy or motto."

  # 关于我（侧边栏简介，旧版本用，可留空）
  aboutShort = ""

  # 文章
  showReadingTime = true
  showWordCount = true

  # Waline 评论（部署后填写 serverURL 启用）
  [params.waline]
    serverURL = ""

  # 社交
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yourname"

  [[params.socialIcons]]
    name = "mail"
    url = "mailto:you@example.com"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

# 主导航
[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 10
  [[menu.main]]
    name = "项目"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    name = "豆瓣"
    url = "/douban/"
    weight = 30
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 40
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 50
  [[menu.main]]
    name = "友链"
    url = "/links/"
    weight = 60

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
  [markup.highlight]
    style = "github"
    lineNos = false
    codeFences = true
    guessSyntax = true
    tabWidth = 2

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
