# 友链数据 - 分类管理
#
# 每个 group:
#   id      短标识（仅供自己区分）
#   name    分类显示名
#   desc    分类一句话描述（在分类标题右侧显示，可空）
#   items   该分类下的友链列表
#
# 每个 item:
#   name    站点名称（必填）
#   url     站点地址（必填）
#   desc    一句话描述（可空，最多两行省略）
#   avatar  头像 URL（可空 —— 空时显示首字母占位）

groups:
  - id: friends
    name: 好友
    desc: 现实中认识的朋友，或聊得来的同道中人。
    items:
      - name: Cairn
        url: https://github.com/amigoer/cairn
        desc: 极简、内容向的个人站点 Hugo 主题。
        avatar: ""

  - id: tech
    name: 技术博主
    desc: 写代码、聊技术、分享思考的博客。
    items: []

  - id: recommend
    name: 值得一读
    desc: 偶然发现、内容长期高质量的站点。
    items: []
